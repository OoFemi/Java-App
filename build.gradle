plugins {
    id 'org.springframework.boot' version '3.3.0'
    id 'io.spring.dependency-management' version '1.1.5'
    id 'java'
}

group = 'com.loganalysis'
version = '1.0-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    // 1. Core Spring Boot Web framework (Missing from lines 19-26)
    implementation 'org.springframework.boot:spring-boot-starter-web'
    
    // 2. Log4j libraries required by the App.java imports (Missing from lines 19-26)
    implementation 'org.apache.logging.log4j:log4j-api:2.23.1'
    implementation 'org.apache.logging.log4j:log4j-core:2.23.1'
    
    // 3. Logstash encoder for structured JSON log formatting
    implementation 'net.logstash.logback:logstash-logback-encoder:7.4'

    // 4. Modern testing framework compatibility
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}
