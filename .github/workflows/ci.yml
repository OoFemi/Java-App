# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle
name: Java CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Permissions required to publish packages to GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  # --- CI Stage: Build and Test Validation ---
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Run Tests
      run: ./gradlew test

  # --- CD Stage: Build and Push Docker Container ---
  publish-image:
    runs-on: ubuntu-latest
    needs: build-and-test # Safeguard: Only packages if tests pass
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log into GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Lowercase Repository Owner Name
      run: |
        echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
      env:
        OWNER: ${{ github.repository_owner }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ghcr.io/${{ env.OWNER_LC }}/java-app:latest
          ghcr.io/${{ env.OWNER_LC }}/java-app:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

