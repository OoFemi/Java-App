# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle
name: Java CI with Gradle

# Trigger this workflow whenever code is pushed or a PR is made to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down a copy of your repository's code onto the runner machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Provision a clean Eclipse Temurin JDK 21 environment
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 3. Cache Gradle dependencies so subsequent builds are lightning fast
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 4. Give execution permissions to your Gradle wrapper script
    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    # 5. Run the full compilation, static checks, and JUnit 5 verification
    - name: Build and Test with Gradle
      run: ./gradlew build